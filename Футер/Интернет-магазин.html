<style>
/* --- Apple Footer Menu (Catalog Block) --- */
:root {
    --apple-text-link: #424245; /* Темно-серый */
    --apple-blue: #0071e3;      /* Фирменный синий */
    --apple-font: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
}

.apple-footer-menu {
    font-family: var(--apple-font);
    text-align: left;
    padding: 0;
    width: 100%;
}

/* Список */
.apple-menu-list {
    list-style: none !important;
    padding: 0 !important;
    margin: 0 !important;
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.apple-menu-item {
    margin: 0 !important;
    padding: 0 !important;
    list-style: none !important;
}
.apple-menu-item::before { display: none !important; }

/* Ссылки */
.apple-menu-item a {
    font-size: 13px;
    color: var(--apple-text-link) !important;
    text-decoration: none !important;
    transition: color 0.2s ease-in-out;
    display: inline-block;
    line-height: 1.3;
}

/* Эффект при наведении - СИНИЙ */
.apple-menu-item a:hover {
    color: var(--apple-blue) !important;
    text-decoration: none !important;
}

/* Адаптивность */
@media (max-width: 768px) {
    .apple-footer-menu {
        padding: 5px 0;
    }

    .apple-menu-item a {
        font-size: 14px;
        padding: 4px 0;
        display: block;
    }
}
</style>
{/literal}
