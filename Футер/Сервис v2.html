{literal}
<style>
/* --- Apple Service Menu with Icons + анимированная подчёркивающая полоска --- */
.apple-service-menu {
    --apple-text-link: #424245;
    --apple-blue: #568DFE; /* Синий, как в шапке сайта — единый дизайн hover-эффектов */
    --apple-blue-hover: #0077ed;
    --apple-icon-gray: #86868b;
    --apple-bg-btn: #f5f5f7;
    --apple-font: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
}

.apple-service-menu {
    font-family: var(--apple-font);
    text-align: left;
    width: 100%;
}

/* Список */
.service-list {
    list-style: none !important;
    padding: 0 !important;
    margin: 0 0 20px 0 !important;
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.service-item {
    margin: 0 !important;
    padding: 0 !important;
    list-style: none !important;
}
.service-item::before { display: none !important; }

/* Ссылка с иконкой */
.service-link {
    position: relative;
    display: flex;
    align-items: center;
    width: fit-content;
    text-decoration: none !important;
    color: var(--apple-text-link) !important;
    font-size: 13px;
    transition: color 0.2s ease;
    line-height: 1.3;
}

/* Подчёркивание "выезжает" слева направо при наведении — как в шапке сайта */
.service-link::before {
    content: '';
    position: absolute;
    left: 28px; /* начинается после иконки, под текстом */
    right: 0;
    bottom: -2px;
    width: 0%;
    height: 2px;
    background: var(--apple-blue);
    transition: width 0.25s ease;
}

/* Иконка слева */
.service-icon {
    width: 18px;
    height: 18px;
    margin-right: 10px;
    color: var(--apple-icon-gray); /* Иконки серые по умолчанию */
    transition: color 0.2s ease;
    flex-shrink: 0;
}

.service-icon svg {
    width: 100%;
    height: 100%;
    fill: currentColor;
}

/* Hover эффект для всего пункта */
.service-link:hover {
    color: var(--apple-blue) !important;
}
.service-link:hover .service-icon {
    color: var(--apple-blue); /* Иконка тоже синеет */
}
.service-link:hover::before {
    width: calc(100% - 28px);
}

/* --- Кнопка Telegram (без изменений) --- */
.tg-service-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background-color: var(--apple-blue);
    color: #ffffff !important;
    font-size: 13px;
    font-weight: 500;
    text-decoration: none !important;
    padding: 10px 16px;
    border-radius: 980px; /* Pill shape */
    transition: transform 0.2s, background-color 0.2s;
    width: 100%; /* На всю ширину колонки */
    box-sizing: border-box;
    box-shadow: 0 2px 8px rgba(0, 113, 227, 0.2);
}

.tg-service-btn:hover {
    background-color: var(--apple-blue-hover);
    transform: scale(1.02);
    text-decoration: none !important;
    color: #ffffff !important;
}

.tg-btn-icon {
    width: 16px;
    height: 16px;
    margin-right: 8px;
    fill: #ffffff;
}

/* Адаптивность */
@media (max-width: 768px) {
    .service-link {
        font-size: 14px;
        padding: 4px 0;
    }
    .tg-service-btn {
        width: auto; /* На мобильном кнопка по ширине контента или 100% - как решите */
        min-width: 200px;
    }
}
</style>
{/literal}
