<style>
/* --- iOS Mobile Menu Style --- */
:root {
    --ios-bg: #ffffff;
    --ios-press: #e5e5ea; /* Цвет нажатия */
    --ios-text: #000000;
    --ios-separator: #c6c6c8;
    --ios-arrow: #c7c7cc;
    --ios-blue: #0071e3;
    --ios-icon-size: 20px;
}

.mm-ios-menu {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--ios-bg);
    display: flex;
    flex-direction: column;
    padding-left: 16px; /* Отступ для линий разделителей */
    margin-top: 10px;
    margin-bottom: 20px;
}

.mm-ios-link {
    display: flex;
    align-items: center;
    text-decoration: none !important;
    padding: 14px 16px 14px 0; /* Отступ справа и вертикально */
    border-bottom: 0.5px solid var(--ios-separator); /* Тонкая линия как в iOS */
    transition: background-color 0.1s;
    color: var(--ios-text) !important;
    position: relative;
    /* Убираем стандартное выделение на мобилках */
    -webkit-tap-highlight-color: transparent;
}

.mm-ios-link:last-child {
    border-bottom: none;
}

.mm-ios-link:active {
    background-color: var(--ios-press);
    /* Компенсация margin-left при активном состоянии, чтобы фон был на всю ширину */
    margin-left: -16px;
    padding-left: 16px;
}

/* Иконка слева */
.mm-ios-icon {
    width: 28px;
    height: 28px;
    margin-right: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--ios-blue); /* Фирменный синий цвет иконок */
    flex-shrink: 0;
}

.mm-ios-icon svg {
    width: var(--ios-icon-size);
    height: var(--ios-icon-size);
    fill: currentColor;
}

/* Текст */
.mm-ios-label {
    font-size: 16px; /* Стандартный размер текста в настройках iOS */
    font-weight: 400;
    flex-grow: 1;
    letter-spacing: -0.01em;
}

/* Стрелочка справа */
.mm-ios-chevron {
    color: var(--ios-arrow);
    width: 14px;
    height: 14px;
}

/* Спец. стиль для Telegram */
.mm-ios-link.telegram .mm-ios-icon {
    color: #24A1DE; /* Цвет Telegram */
}
.mm-ios-link.telegram .mm-ios-label {
    color: #24A1DE;
    font-weight: 500;
}

</style>
{/literal}
