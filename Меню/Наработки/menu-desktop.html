<style>
/* ==========================================
   Desktop catalog menu — Maxmobiles (iPort-style)
   Размещение: Design → Layouts → HTML block
   Шаг 1: корневые пункты верхней строки +
   адаптивное скрытие лишних пунктов за кнопкой
   "ещё" (три точки) при сужении окна.
   CSS временно внутри блока, позже вынести в
   общий файл темы (maxmobiles-styles.css).

   Список ссылок и кнопка "ещё" — flex-соседи
   внутри .mm-desktop-nav__inner (а не кнопка
   внутри списка): так список может свободно
   сжиматься (flex:1 1 auto; min-width:0),
   а переполнение проверяется через
   scrollWidth > clientWidth на самом списке —
   это не зависит от паддингов и особенностей
   родительской сетки CS-Cart.
   ========================================== */

/* .r-h-menu — обёртка CS-Cart для этой секции меню, сама
   является flex-контейнером (изначально под нативное меню).
   Её дочерние элементы по умолчанию получают min-width:auto
   и отказываются сжиматься меньше "естественной" ширины
   нашего контента — из-за этого блок не сужался вместе с
   окном. Разрешаем сжатие по всей цепочке внутри обёртки. */
.r-h-menu > div,
.r-h-menu > div > .ty-wysiwyg-content {
  min-width: 0 !important;
  flex-shrink: 1 !important;
}

.mm-desktop-nav {
  background: #000000;
  width: 100%;
}

.mm-desktop-nav__inner {
  display: flex;
  align-items: center;
  width: 100%;
  max-width: 1500px;
  min-width: 0;
  height: 46px;
  margin: 0 auto;
  box-sizing: border-box;
  padding: 0;
  gap: 16px;
}

.mm-desktop-nav__list {
  display: flex;
  align-items: center;
  gap: 32px;
  margin: 0;
  padding: 0;
  list-style: none;
  flex: 1 1 auto;
  min-width: 0;
  overflow: hidden;
}

.mm-desktop-nav__item {
  display: flex;
  flex-shrink: 0;
}

.mm-desktop-nav__link {
  position: relative;
  display: inline-flex;
  align-items: center;
  color: #ffffff;
  font-size: 16px;
  font-weight: 500;
  line-height: 22px;
  text-decoration: none;
  white-space: nowrap;
  transition: color 0.2s ease;
}

.mm-desktop-nav__link:hover {
  color: #568DFE;
}

/* Подчёркивание "выезжает" слева направо при наведении */
.mm-desktop-nav__link:not(.mm-desktop-nav__link--highlight)::before {
  content: '';
  position: absolute;
  left: 0;
  bottom: -4px;
  width: 0%;
  height: 2px;
  background: #568DFE;
  transition: width 0.25s ease;
}

.mm-desktop-nav__link:not(.mm-desktop-nav__link--highlight):hover::before {
  width: 100%;
}

/* ── Выделенный пункт (пилюля-градиент, как первая вкладка на iPort) ── */
.mm-desktop-nav__link--highlight {
  position: relative;
  background: linear-gradient(90deg, #b17e62 0%, #f0b680 100%);
  border-radius: 38px;
  padding: 4px 14px;
  box-shadow: 0 0 0 rgba(240, 182, 128, 0);
  transition: box-shadow 0.3s ease, opacity 0.2s ease;
}

.mm-desktop-nav__link--highlight:hover {
  color: #ffffff;
  opacity: 0.95;
  box-shadow: 0 0 10px 2px rgba(240, 182, 128, 0.55), 0 0 22px 6px rgba(177, 126, 98, 0.4);
}

/* Искры — две мерцающие точки рядом с пилюлей, только opacity (без transform) */
.mm-desktop-nav__link--highlight::before,
.mm-desktop-nav__link--highlight::after {
  content: '';
  position: absolute;
  border-radius: 50%;
  background: radial-gradient(circle, #ffffff 0%, #f0b680 55%, transparent 100%);
  opacity: 0;
  pointer-events: none;
}

.mm-desktop-nav__link--highlight::before {
  width: 6px;
  height: 6px;
  top: -5px;
  left: 22%;
}

.mm-desktop-nav__link--highlight::after {
  width: 4px;
  height: 4px;
  bottom: -4px;
  right: 18%;
}

.mm-desktop-nav__link--highlight:hover::before {
  animation: mm-sparkle 0.9s ease-in-out infinite;
}

.mm-desktop-nav__link--highlight:hover::after {
  animation: mm-sparkle 0.9s ease-in-out infinite 0.35s;
}

@keyframes mm-sparkle {
  0%, 100% { opacity: 0; }
  50% { opacity: 1; }
}

/* ── Вариант «в стиле Apple» — серебристо-графитовый градиент ── */
.mm-desktop-nav__link--highlight-apple {
  background: linear-gradient(90deg, #4a4a4d 0%, #c7c7cc 100%);
}

.mm-desktop-nav__link--highlight-apple:hover {
  box-shadow: 0 0 10px 2px rgba(199, 199, 204, 0.5), 0 0 22px 6px rgba(74, 74, 77, 0.35);
}

.mm-desktop-nav__link--highlight-apple::before,
.mm-desktop-nav__link--highlight-apple::after {
  background: radial-gradient(circle, #ffffff 0%, #c7c7cc 55%, transparent 100%);
}

.mm-desktop-nav__divider {
  width: 1px;
  height: 24px;
  background: rgba(159, 160, 176, 0.4);
  flex-shrink: 0;
}

/* ── Кнопка "ещё" (три точки) ── */
.mm-desktop-nav__more {
  position: relative;
  display: none;
  flex-shrink: 0;
}

.mm-desktop-nav__more-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: none;
  background: rgba(255, 255, 255, 0.08);
  color: #ffffff;
  cursor: pointer;
  padding: 0;
  transition: background 0.2s ease, color 0.2s ease;
}

.mm-desktop-nav__more-btn:hover,
.mm-desktop-nav__more-btn[aria-expanded="true"] {
  background: rgba(255, 255, 255, 0.16);
  color: #568DFE;
}

/* ── Дроп-даун с оставшимися пунктами ── */
.mm-desktop-nav__dropdown {
  display: none;
  position: absolute;
  top: calc(100% + 12px);
  right: 0;
  min-width: 220px;
  background: #000000;
  border-radius: 20px;
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
  padding: 16px 20px;
  z-index: 50;
}

.mm-desktop-nav__dropdown--open {
  display: block;
}

.mm-desktop-nav__dropdown-list {
  list-style: none;
  margin: 0;
  padding: 0;
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.mm-desktop-nav__dropdown-link {
  display: block;
  padding: 8px 4px;
  border-radius: 10px;
  color: #ffffff;
  font-size: 15px;
  font-weight: 500;
  text-decoration: none;
  transition: color 0.15s ease;
}

.mm-desktop-nav__dropdown-link:hover {
  color: #568DFE;
}
</style>

<nav class="mm-desktop-nav" aria-label="Каталог">
  <div class="mm-desktop-nav__inner">
    <ul class="mm-desktop-nav__list" id="mmDesktopNavList">
      <li class="mm-desktop-nav__item"><a class="mm-desktop-nav__link mm-desktop-nav__link--highlight" href="https://maxmobiles.ru/aksessuary-ru/portativnye-elektrostancii/">Зарядные станции</a></li>
      <li class="mm-desktop-nav__item"><a class="mm-desktop-nav__link" href="https://maxmobiles.ru/iphone/">iPhone</a></li>
      <li class="mm-desktop-nav__item"><a class="mm-desktop-nav__link" href="https://maxmobiles.ru/ipad/">iPad</a></li>
      <li class="mm-desktop-nav__item"><a class="mm-desktop-nav__link" href="https://maxmobiles.ru/mac/">Mac</a></li>
      <li class="mm-desktop-nav__item"><a class="mm-desktop-nav__link" href="https://maxmobiles.ru/apple-airpods/">AirPods</a></li>
      <li class="mm-desktop-nav__item"><a class="mm-desktop-nav__link" href="https://maxmobiles.ru/apple-watch/">Watch</a></li>

      <li class="mm-desktop-nav__divider" aria-hidden="true"></li>

      <li class="mm-desktop-nav__item"><a class="mm-desktop-nav__link mm-desktop-nav__link--highlight mm-desktop-nav__link--highlight-apple" href="https://maxmobiles.ru/apple-idealnoe-bu/">Идеальное БУ</a></li>

      <li class="mm-desktop-nav__divider" aria-hidden="true"></li>

      <li class="mm-desktop-nav__item"><a class="mm-desktop-nav__link" href="https://maxmobiles.ru/android-smartfony/">Смартфоны</a></li>
      <li class="mm-desktop-nav__item"><a class="mm-desktop-nav__link" href="https://maxmobiles.ru/gadzhety/">Мультимедиа и гаджеты</a></li>
      <li class="mm-desktop-nav__item"><a class="mm-desktop-nav__link" href="https://maxmobiles.ru/krasota-i-zdorove-ru/">Красота и здоровье</a></li>
    </ul>

    <div class="mm-desktop-nav__more" id="mmNavMore">
      <button type="button" class="mm-desktop-nav__more-btn" id="mmNavMoreBtn" aria-haspopup="true" aria-expanded="false" aria-label="Ещё разделы каталога">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="4" cy="10" r="1.8" fill="currentColor"/>
          <circle cx="10" cy="10" r="1.8" fill="currentColor"/>
          <circle cx="16" cy="10" r="1.8" fill="currentColor"/>
        </svg>
      </button>
      <div class="mm-desktop-nav__dropdown" id="mmNavDropdown" role="menu">
        <ul class="mm-desktop-nav__dropdown-list" id="mmNavDropdownList"></ul>
      </div>
    </div>
  </div>
</nav>

<script>
(function () {
  var GAP = 32;

  function recalc() {
    var list = document.getElementById('mmDesktopNavList');
    var moreItem = document.getElementById('mmNavMore');
    var moreBtn = document.getElementById('mmNavMoreBtn');
    var dropdown = document.getElementById('mmNavDropdown');
    var dropdownList = document.getElementById('mmNavDropdownList');
    if (!list || !moreItem) return;

    var items = Array.prototype.slice.call(list.children);

    // Сброс перед пересчётом
    items.forEach(function (el) { el.style.display = ''; });
    moreItem.style.display = 'none';
    moreBtn.setAttribute('aria-expanded', 'false');
    dropdown.classList.remove('mm-desktop-nav__dropdown--open');
    dropdownList.innerHTML = '';

    // Реально ли что-то не помещается (учитывает и паддинги, и особенности
    // родительской сетки — сравниваются два измерения одного и того же блока)
    if (list.scrollWidth <= list.clientWidth) {
      return;
    }

    moreItem.style.display = 'flex';
    // После показа кнопки список сам сжался за счёт flex — его текущая
    // ширина уже честно учитывает место, оставшееся под пункты
    var available = list.clientWidth;

    var used = 0;
    var visibleCount = 0;
    for (var i = 0; i < items.length; i++) {
      var w = items[i].getBoundingClientRect().width;
      var next = used + (visibleCount > 0 ? GAP : 0) + w;
      if (next > available) break;
      used = next;
      visibleCount++;
    }

    // Разделитель не должен оставаться последним видимым пунктом
    while (visibleCount > 0 && items[visibleCount - 1].classList.contains('mm-desktop-nav__divider')) {
      visibleCount--;
    }

    var fragment = document.createDocumentFragment();
    for (var j = visibleCount; j < items.length; j++) {
      items[j].style.display = 'none';
      if (!items[j].classList.contains('mm-desktop-nav__divider')) {
        var link = items[j].querySelector('a');
        if (link) {
          var li = document.createElement('li');
          var a = link.cloneNode(true);
          a.className = 'mm-desktop-nav__dropdown-link';
          li.appendChild(a);
          fragment.appendChild(li);
        }
      }
    }
    dropdownList.appendChild(fragment);
  }

  function toggleDropdown(e) {
    e.stopPropagation();
    var dropdown = document.getElementById('mmNavDropdown');
    var moreBtn = document.getElementById('mmNavMoreBtn');
    var isOpen = dropdown.classList.toggle('mm-desktop-nav__dropdown--open');
    moreBtn.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
  }

  function closeDropdown() {
    var dropdown = document.getElementById('mmNavDropdown');
    var moreBtn = document.getElementById('mmNavMoreBtn');
    if (dropdown) dropdown.classList.remove('mm-desktop-nav__dropdown--open');
    if (moreBtn) moreBtn.setAttribute('aria-expanded', 'false');
  }

  function init() {
    var moreBtn = document.getElementById('mmNavMoreBtn');
    if (moreBtn) moreBtn.addEventListener('click', toggleDropdown);

    document.addEventListener('click', function (e) {
      var moreItem = document.getElementById('mmNavMore');
      if (moreItem && !moreItem.contains(e.target)) closeDropdown();
    });

    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape') closeDropdown();
    });

    var resizeTimer;
    var scheduleRecalc = function () {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(recalc, 120);
    };

    window.addEventListener('resize', scheduleRecalc);

    if (window.ResizeObserver) {
      var nav = document.querySelector('.mm-desktop-nav');
      if (nav) new ResizeObserver(scheduleRecalc).observe(nav);
    }

    if (document.fonts && document.fonts.ready) {
      document.fonts.ready.then(recalc);
    }

    recalc();
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>
