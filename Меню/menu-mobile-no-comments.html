    }, 100);
  }
function mmNavOpenSub() {
    if (!sub) return;
    sub.classList.add('is-open');
    sub.setAttribute('aria-hidden', 'false');
    if (catalogBtn) catalogBtn.setAttribute('aria-expanded', 'true');
  }
  function mmNavCloseSub() {
    mmNavCloseLevel3();
    if (!sub) return;
    sub.classList.remove('is-open');
    sub.setAttribute('aria-hidden', 'true');
    if (catalogBtn) catalogBtn.setAttribute('aria-expanded', 'false');
  }
function mmNavOpenLevel3(key) {
    var data = mmCatalogData[key];
    if (!data || !level3) return;
    if (l3Title) l3Title.textContent = data.title;
    if (l3Content) {
      var html = '';
      var arrow = '<svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M6.5 4l5 5-5 5" stroke="#c7c7cc" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>';
      data.items.forEach(function (item) {
        if (item.sub) {
          html += '<li><button class="mm-nav-l3-btn" onclick="mmNavOpenLevel4(\'' + item.sub + '\')" type="button">' +
                  '<span class="mm-nav-l3-btn__label">' + item.name + '</span>' + arrow + '</button></li>';
        } else {
          html += '<li><a class="mm-nav-l3-item" href="' + item.url + '">' + item.name + '</a></li>';
        }
      });
      if (data.allUrl) {
        html += '<li><a class="mm-nav-l3-item mm-nav-l3-item--all" href="' + data.allUrl + '">Все товары категории</a></li>';
      }
      l3Content.innerHTML = html;
    }
    level3.classList.add('is-open');
    level3.setAttribute('aria-hidden', 'false');
  }
  function mmNavCloseLevel3() {
    mmNavCloseLevel4();
    if (!level3) return;
    level3.classList.remove('is-open');
    level3.setAttribute('aria-hidden', 'true');
  }
function mmNavOpenLevel4(key) {
    var data = mmLevel4Data[key];
    if (!data || !level4) return;
    if (l4Title) l4Title.textContent = data.title;
    if (l4Content) {
      var html = '';
      data.items.forEach(function (item) {
        html += '<li><a class="mm-nav-l3-item" href="' + item.url + '">' + item.name + '</a></li>';
      });
      if (data.allUrl) {
        html += '<li><a class="mm-nav-l3-item mm-nav-l3-item--all" href="' + data.allUrl + '">Все товары категории</a></li>';
      }
      l4Content.innerHTML = html;
    }
    level4.classList.add('is-open');
    level4.setAttribute('aria-hidden', 'false');
  }
  function mmNavCloseLevel4() {
    if (!level4) return;
    level4.classList.remove('is-open');
    level4.setAttribute('aria-hidden', 'true');
  }
function mmNavCloseAll() {
    mmNavCloseLevel4();
    mmNavCloseLevel3();
    mmNavCloseSub();
    mmNavCloseCSCart();
  }
  function mmNavCloseCSCart() {
    var ourRoot = document.querySelector('.mm-nav-content');
    if (ourRoot && ourRoot.parentElement) {
      var siblings = ourRoot.parentElement.querySelectorAll('button, a, [role="button"]');
      for (var i = 0; i < siblings.length; i++) {
        var btn = siblings[i];
        if (btn.closest('.mm-nav-content') ||
            btn.closest('.mm-nav-sub') ||
            btn.closest('.mm-nav-level3') ||
            btn.closest('.mm-nav-level4')) continue;
        var cls   = (btn.className || '').toLowerCase();
        var label = (btn.getAttribute('aria-label') || '').toLowerCase();
        if (/close|закрыть|dismiss|cancel/.test(cls + ' ' + label)) {
          btn.click();
          return;
        }
      }
    }
    var iconEl = document.querySelector('.ut2-icon-baseline-close');
    var csClose =
      (iconEl && iconEl.closest('.cm-combination, .ut2-sp-f')) ||
      document.querySelector('.ut2-sp-f.cm-combination') ||
      document.querySelector('.ty-sidebox__close') ||
      document.querySelector('[class*="sidebox__close"]') ||
      document.querySelector('.ty-offcanvas-menu__close') ||
      document.querySelector('[class*="offcanvas"] [class*="close"]');
    if (csClose) csClose.click();
  }
document.addEventListener('keydown', function (e) {
    if (e.key !== 'Escape') return;
    if (level4 && level4.classList.contains('is-open')) { mmNavCloseLevel4(); }
    else if (level3 && level3.classList.contains('is-open')) { mmNavCloseLevel3(); }
    else if (sub && sub.classList.contains('is-open')) { mmNavCloseSub(); }
  });
  window.mmNavOpenSearch   = mmNavOpenSearch;
  window.mmNavOpenSub      = mmNavOpenSub;
  window.mmNavCloseSub     = mmNavCloseSub;
  window.mmNavOpenLevel3   = mmNavOpenLevel3;
  window.mmNavCloseLevel3  = mmNavCloseLevel3;
  window.mmNavOpenLevel4   = mmNavOpenLevel4;
  window.mmNavCloseLevel4  = mmNavCloseLevel4;
  window.mmNavCloseAll     = mmNavCloseAll;
  window.mmCatalogData     = mmCatalogData;
  window.mmLevel4Data      = mmLevel4Data;
}());
</script>
