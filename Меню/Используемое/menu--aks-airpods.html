<script>
(function () {
  var grids = document.querySelectorAll('[data-responsive-grid]');
  var headings = document.querySelectorAll('[data-responsive-heading]');
  var mql = window.matchMedia('(max-width: 640px)');
  function applyResponsive() {
    for (var i = 0; i < grids.length; i++) {
      grids[i].style.gridTemplateColumns = mql.matches ? 'repeat(2, 1fr)' : grids[i].getAttribute('data-desktop-cols');
    }
    for (var j = 0; j < headings.length; j++) {
      headings[j].style.fontSize = mql.matches ? headings[j].getAttribute('data-mobile-size') : headings[j].getAttribute('data-desktop-size');
    }
  }
  applyResponsive();
  if (mql.addEventListener) {
    mql.addEventListener('change', applyResponsive);
  } else if (mql.addListener) {
    mql.addListener(applyResponsive);
  }
})();
</script>

<script>
(function () {
  var links = document.querySelectorAll('[data-hover-lift]');
  for (var i = 0; i < links.length; i++) {
    (function (el) {
      el.addEventListener('mouseenter', function () { el.style.top = '-6px'; });
      el.addEventListener('mouseleave', function () { el.style.top = '0'; });
    })(links[i]);
  }
})();
</script>
